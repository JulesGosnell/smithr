# layers/ios.yml
#
# iOS Phone Layer - macOS VM with iOS Simulator
#
# Runs macOS Sonoma via Docker-OSX (QEMU) with iOS Simulator.
# Uses QCOW2 overlays so the base image is never modified.
#
# Requirements:
#   - KVM available (/dev/kvm) for hardware virtualisation
#   - macOS base image at configured path
#   - ~22GB RAM per macOS VM instance
#
# Apple Constraint:
#   Only ONE instance of each iPhone model per macOS VM.
#   For duplicate models, use separate macOS VMs (separate compose instances).
#
# Usage:
#   docker compose -f layers/network.yml -f layers/ios.yml up -d
#
# Environment Variables:
#   SMITHR_PREFIX            - Container name prefix (default: smithr)
#   SMITHR_IOS_VM_ID         - VM instance ID (default: 0)
#   SMITHR_MACOS_IMAGE       - Path to macOS base image (default: /srv/shared/images/smithr-sonoma.img)
#   SMITHR_MACOS_RAM         - RAM for macOS VM (default: 22GB)
#   SMITHR_MACOS_CORES       - CPU cores for VM (default: 4)
#   SMITHR_MACOS_CPU         - CPU model (default: Haswell-noTSX)
#   SMITHR_MACOS_VGA         - VGA type (default: vmware)
#   SMITHR_MACOS_VNC_PORT    - Host VNC port (default: 5999)
#   SMITHR_MACOS_SSH_PORT    - Host SSH port (default: 50922)
#   SMITHR_MACOS_IP          - Fixed IP (default: 10.21.0.40)
#   SMITHR_IOS_DEVICE        - iOS device model (default: iPhone 16)
#   SMITHR_IOS_RUNTIME       - iOS runtime version (default: iOS 18.3)
#   SMITHR_MACOS_SSH_USER    - SSH user on macOS (default: claude)
#
# Networking:
#   macOS guest uses QEMU NAT (10.0.2.x). socat bridges from
#   smithr-network to the guest via port forwarding.

services:
  ios:
    image: sickcodes/docker-osx:sonoma
    container_name: ${SMITHR_PREFIX:-smithr}-ios-${SMITHR_IOS_VM_ID:-0}
    environment:
      NOPICKER: "true"
      RAM: ${SMITHR_MACOS_RAM:-22}
      SMP: ${SMITHR_MACOS_CORES:-4}
      CPU: ${SMITHR_MACOS_CPU:-Haswell-noTSX}
      DISPLAY_RESOLUTION: "1920x1080"
    devices:
      - /dev/kvm:/dev/kvm
    ports:
      - "${SMITHR_MACOS_VNC_PORT:-5999}:5999"
      - "${SMITHR_MACOS_SSH_PORT:-50922}:10022"
    volumes:
      - "${SMITHR_MACOS_IMAGE:?SMITHR_MACOS_IMAGE must be set}:/image:ro"
    healthcheck:
      test: ["CMD-SHELL", "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -p 10022 ${SMITHR_MACOS_SSH_USER:-claude}@localhost 'echo ok' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 60
      start_period: 300s
    networks:
      default:
        ipv4_address: ${SMITHR_MACOS_IP:-10.21.0.40}
    restart: unless-stopped

networks:
  default:
    external: true
    name: ${SMITHR_NETWORK_NAME:-smithr-network}
