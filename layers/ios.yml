# layers/ios.yml
#
# iOS Simulator Sidecar - Boots iOS Simulator inside the macOS VM
#
# This adds an Alpine sidecar container that SSHs into the macOS VM
# and boots the iOS Simulator with the configured device.
#
# Requires: layers/xcode.yml (provides the 'macos' service)
#
# Architecture:
#   ios.yml
#   +-- xcode.yml (macos service)
#       +-- macOS VM + Simulator (booted by ios sidecar)
#
# Usage:
#   SMITHR_MACOS_IMAGE=/srv/shared/images/artha-sonoma.img \
#     docker compose -f layers/network.yml -f layers/xcode.yml -f layers/ios.yml up -d
#
# The sidecar:
#   1. Waits for macOS to become healthy (SSH + Dock running)
#   2. Shuts down any existing simulator devices (clean slate)
#   3. Boots the requested device by UUID
#   4. Opens Simulator.app
#   5. Verifies device is booted
#   6. Stays running so healthcheck can verify

include:
  - xcode.yml

services:
  ios:
    image: alpine:latest
    container_name: ${SMITHR_PREFIX:-smithr}-ios-${SMITHR_XCODE_RUNE:-fe}
    depends_on:
      macos:
        condition: service_healthy
    volumes:
      # Mount simulator boot script
      - "${SMITHR_SCRIPTS_DIR:-./scripts/ios}/ios-sim-boot.sh:/boot.sh:z"
      - "${SMITHR_SCRIPTS_DIR:-./scripts/ios}/ssh/macos-ssh-key:/ssh-key/macos-ssh-key:z"
    environment:
      SSH_HOST: "${SMITHR_PREFIX:-smithr}-xcode-${SMITHR_XCODE_RUNE:-fe}"
      SSH_PORT: "10022"
      SSH_USER: "${SMITHR_MACOS_SSH_USER:-smithr}"
      SSH_KEY: "/ssh-key/macos-ssh-key"
      IOS_DEVICE: "${SMITHR_IOS_DEVICE:-iPhone 16}"
      IOS_RUNTIME: "${SMITHR_IOS_RUNTIME:-iOS 18.3}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache openssh-client
        # Copy key to writable location (source mount may be :ro)
        cp /ssh-key/macos-ssh-key /tmp/macos-ssh-key
        chmod 600 /tmp/macos-ssh-key
        export SSH_KEY=/tmp/macos-ssh-key
        exec /boot.sh
    labels:
      smithr.managed: "true"
      smithr.resource.type: "phone"
      smithr.resource.platform: "ios"
      smithr.resource.pool: "ios"
      smithr.resource.parent: "${SMITHR_PREFIX:-smithr}-xcode-${SMITHR_XCODE_RUNE:-fe}"
      # iOS sidecar doesn't run SSH — route to the macOS VM
      smithr.resource.connect-host: "${SMITHR_MACOS_IP:-10.21.0.40}"
      smithr.resource.connect-port: "10022"
    healthcheck:
      # Check that Simulator has a booted device
      test: ["CMD-SHELL", "ssh -i /tmp/macos-ssh-key -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o BatchMode=yes -p $${SSH_PORT} $${SSH_USER}@$${SSH_HOST} \"xcrun simctl list devices booted 2>/dev/null | grep -qF '$${IOS_DEVICE} ('\""]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    networks:
      default:
        # No fixed IP needed for sidecar
    restart: "no"
