# layers/android-worker.yml
#
# Near-side worker container for Android emulators.
# Deploys a smithr-phone-worker alongside each Android emulator,
# providing SSH + Maestro + ADB colocated with the phone resource.
#
# Usage (alongside android.yml):
#   docker compose -f layers/network.yml -f layers/android.yml \
#     -f layers/android-worker.yml -p smithr-phone-fe up -d
#
# Environment Variables:
#   SMITHR_PREFIX              - Container name prefix (default: smithr)
#   SMITHR_ANDROID_RUNE        - Phone instance rune name (default: fe)
#   SMITHR_ANDROID_IP          - IP of the Android emulator on smithr-network

services:
  android-worker:
    image: smithr-phone-worker:latest
    container_name: ${SMITHR_PREFIX:-smithr}-android-${SMITHR_ANDROID_RUNE:-fe}-worker
    restart: unless-stopped
    environment:
      PHONE_HOST: ${SMITHR_PREFIX:-smithr}-android-${SMITHR_ANDROID_RUNE:-fe}
      PLATFORM: android
    volumes:
      - ${HOME}/.android:/root/.android:ro,z
      - ${HOME}/.ssh/id_ed25519.pub:/root/.ssh/authorized_keys.mount:ro,z
    labels:
      smithr.managed: "false"
      smithr.worker-for: ${SMITHR_PREFIX:-smithr}-android-${SMITHR_ANDROID_RUNE:-fe}
    depends_on:
      android:
        condition: service_healthy
    networks:
      default:

networks:
  default:
    external: true
    name: ${SMITHR_NETWORK_NAME:-smithr-network}
