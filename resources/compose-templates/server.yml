#
# Adopt an external server container through Smithr
#
# Used to reach containers started outside Smithr (e.g. an API server
# started by CI).  Each proxy independently adopts the container and
# gets its own tunnels — multiple proxies can coexist safely.
#
# Usage:
#   curl -s http://localhost:7070/api/compose/server > /tmp/server.yml
#   SMITHR_CONTAINER_NAME=my-api SMITHR_LESSEE=ci-123 \
#     docker compose -f /tmp/server.yml -p my-server up -d
#
# Env vars:
#   SMITHR_CONTAINER_NAME — Docker container name to adopt (required)
#   SMITHR_LESSEE         — Who owns this adopt (default: anonymous)
#   SMITHR_TTL            — Adopt TTL in seconds (default: 3600)
#   SMITHR_PORTS          — Ports to tunnel (default: 3000)
#
services:
  server:
    image: {{REGISTRY}}/smithr/proxy:latest
    pull_policy: always
    stop_grace_period: 30s
    healthcheck:
      test: /usr/local/bin/healthcheck.sh
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 15s
    environment:
      SMITHR_MODE: adopt
      SMITHR_URL: {{SMITHR_URL}}
      SMITHR_CONTAINER_NAME: ${SMITHR_CONTAINER_NAME:?required}
      SMITHR_LESSEE: ${SMITHR_LESSEE:-anonymous}
      SMITHR_PORTS: ${SMITHR_PORTS:-3000}
      SMITHR_TTL: ${SMITHR_TTL:-3600}
    networks:
      - smithr-network

networks:
  smithr-network:
    external: true
