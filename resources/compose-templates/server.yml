#
# Lease a server resource through Smithr
#
# Used by E2E tests to reach an API server that has been registered
# with Smithr. Supports concurrent access — multiple tests can lease
# the same server simultaneously.
#
# Usage:
#   curl -s http://localhost:7070/api/compose/server > /tmp/server.yml
#   SMITHR_LESSEE=ci-123 docker compose -f /tmp/server.yml -p my-test up -d
#
# Env vars:
#   SMITHR_LESSEE      — Who owns this lease (default: anonymous)
#   SMITHR_TTL         — Lease TTL in seconds (default: 3600)
#   SMITHR_PORTS       — Ports to tunnel (default: 3000)
#   SMITHR_PREFER_HOST — Prefer a specific host (optional)
#
services:
  server:
    image: {{REGISTRY}}/smithr/proxy:latest
    pull_policy: always
    stop_grace_period: 30s
    healthcheck:
      test: /usr/local/bin/healthcheck.sh
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 15s
    environment:
      SMITHR_MODE: lease
      SMITHR_URL: {{SMITHR_URL}}
      SMITHR_RESOURCE_TYPE: server
      SMITHR_PLATFORM: ${SMITHR_SERVER_PLATFORM:-linux}
      SMITHR_LEASE_TYPE: build
      SMITHR_LESSEE: ${SMITHR_LESSEE:-anonymous}
      SMITHR_PORTS: ${SMITHR_PORTS:-3000}
      SMITHR_TTL: ${SMITHR_TTL:-3600}
      SMITHR_PREFER_HOST: ${SMITHR_PREFER_HOST:-}
    networks:
      - smithr-network
      - internal

networks:
  smithr-network:
    external: true
  internal:
