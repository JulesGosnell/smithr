#
# Maestro test runner sidecar (platform-agnostic)
#
# Auto-detects whether the compose stack contains an Android or iOS phone
# and runs Maestro tests accordingly. Same interface for both platforms.
#
# Compose with a phone proxy and app sidecar:
#
#   curl -s http://localhost:7070/api/compose/android-phone > /tmp/phone.yml
#   curl -s http://localhost:7070/api/compose/android-app > /tmp/app.yml
#   curl -s http://localhost:7070/api/compose/maestro > /tmp/maestro.yml
#   SSH_KEY_PATH=~/.ssh/smithr_worker \
#     docker compose -f /tmp/phone.yml -f /tmp/app.yml -f /tmp/maestro.yml \
#     -p test up -d
#
# Run tests:
#   docker exec test-maestro-1 /run-test.sh /flows/<flow>.yaml [-e KEY=VAL ...]
#
# Env vars:
#   FLOWS_DIR      — host path to Maestro flow files (default: current dir)
#   SSH_KEY_PATH   — host path to SSH private key (required)
#   LOGIN_FLOW     — login flow file path (default: empty = no auto-login)
#   LOGOUT_FLOW    — logout flow file path (default: empty = no auto-logout)
#   BUNDLE_ID      — app package name
#   EMAIL          — login email
#   PASSWORD       — login password
#   ORG_SLUG       — organization slug
#   MAESTRO_EXTRA  — extra args to pass to Maestro (optional)
#   MAESTRO_VARS   — space-separated env var names to auto-forward as Maestro -e flags
#
services:
  maestro:
    image: smithr-simctl-tools:latest
    entrypoint: ["/maestro-sidecar.sh"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      SMITHR_SUBSTRATE: ${SMITHR_SUBSTRATE:-}
      LOGIN_FLOW: ${LOGIN_FLOW:-}
      LOGOUT_FLOW: ${LOGOUT_FLOW:-}
      BUNDLE_ID: ${BUNDLE_ID:-}
      EMAIL: ${EMAIL:-}
      PASSWORD: ${PASSWORD:-}
      ORG_SLUG: ${ORG_SLUG:-}
      MAESTRO_EXTRA: ${MAESTRO_EXTRA:-}
      MAESTRO_VARS: ${MAESTRO_VARS:-EMAIL PASSWORD APP_ID ORG_SLUG}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/maestro-ready"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 120s
    stop_grace_period: 60s
    volumes:
      - ${FLOWS_DIR:-.}:/flows:ro,z
      - ${SSH_KEY_PATH:?SSH_KEY_PATH is required}:/root/.ssh/id_key:ro,z
    networks:
      - internal

networks:
  internal:
