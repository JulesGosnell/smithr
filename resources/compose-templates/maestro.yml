#
# Maestro test sidecar (Android)
#
# Stays alive as a sidecar — run tests via docker exec:
#
#   docker exec <project>-maestro-1 maestro --device $$ADB_TARGET test /flows/login.yaml
#
# Compose this with the android-phone proxy template:
#
#   curl -s http://localhost:7070/api/compose/android-phone > /tmp/phone.yml
#   curl -s http://localhost:7070/api/compose/maestro > /tmp/maestro.yml
#   FLOWS_DIR=/path/to/flows docker compose -f /tmp/phone.yml -f /tmp/maestro.yml -p test up -d
#
# Env vars:
#   ADB_TARGET   — ADB connection target (default: android-phone:5555)
#   DRIVER_PORT  — Maestro driver port (default: 7101)
#   FLOWS_DIR    — Host path to Maestro flow files (default: current dir)
#   API_URL      — (optional) Override app API endpoint via api-config.json
#   BUNDLE_ID    — (optional) Android package name (default: com.artha.healthcare)
#
services:
  maestro:
    image: artha-maestro:latest
    depends_on:
      android-phone:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "[maestro] Connecting ADB to $$ADB_TARGET..."
        for i in $$(seq 1 60); do
          if adb connect "$$ADB_TARGET" 2>/dev/null | grep -q "connected"; then
            break
          fi
          sleep 2
        done
        adb -s "$$ADB_TARGET" wait-for-device
        echo "[maestro] ADB connected."
        # Switch to root early so later adb root calls are no-ops
        # (adbd restart kills reverse mappings; making it a no-op prevents that)
        if [ -n "$$SERVER_SERVICE" ] || [ -n "$$API_URL" ]; then
            adb -s "$$ADB_TARGET" root 2>/dev/null || true
            sleep 2
            adb -s "$$ADB_TARGET" connect "$$ADB_TARGET" 2>/dev/null || true
            adb -s "$$ADB_TARGET" wait-for-device
            echo "[maestro] ADB running as root."
        fi
        # Server bridge: relay SERVER_SERVICE:SERVER_PORT into the emulator
        if [ -n "$$SERVER_SERVICE" ]; then
            echo "[maestro] Server bridge: $$SERVER_SERVICE:$$SERVER_PORT → emulator localhost:$$SERVER_PORT"
            socat TCP-LISTEN:$$SERVER_PORT,fork,reuseaddr TCP:$$SERVER_SERVICE:$$SERVER_PORT &
            sleep 1
            adb -s "$$ADB_TARGET" reverse tcp:$$SERVER_PORT tcp:$$SERVER_PORT
            echo "[maestro] Server bridge ready."
        fi
        # Inject api-config.json so the release APK connects to the test
        # server instead of the baked-in production URL (https://artha.care).
        # Requires root (already switched above).
        if [ -n "$$API_URL" ]; then
            echo "[maestro] Injecting api-config.json: $$API_URL"
            adb -s "$$ADB_TARGET" shell "mkdir -p /data/data/$$BUNDLE_ID/files"
            adb -s "$$ADB_TARGET" shell "echo '{\"apiUrl\": \"$$API_URL\"}' > /data/data/$$BUNDLE_ID/files/api-config.json"
            echo "[maestro] api-config.json written."
        fi
        echo "[maestro] Sidecar ready."
        echo "[maestro] Run tests via: docker exec <container> maestro --device $$ADB_TARGET test /flows/<flow>.yaml"
        exec sleep infinity
    environment:
      ADB_TARGET: ${ADB_TARGET:-android-phone:5555}
      DRIVER_PORT: ${DRIVER_PORT:-7101}
      MAESTRO_OPTS: "-Dmaestro.driver.port=${DRIVER_PORT:-7101}"
      JAVA_TOOL_OPTIONS: ""
      BUNDLE_ID: ${BUNDLE_ID:-com.artha.healthcare}
      API_URL: ${API_URL:-}
      SERVER_SERVICE: ${SERVER_SERVICE:-}
      SERVER_PORT: ${SERVER_PORT:-3000}
    healthcheck:
      test: ["CMD-SHELL", "adb -s $$ADB_TARGET shell echo ok 2>/dev/null | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    volumes:
      - ${FLOWS_DIR:-.}:/flows:ro,z
      - ${ADB_KEY_PATH:-~/.android/adbkey}:/root/.android/adbkey:ro,z
      - ${ADB_KEY_PATH:-~/.android/adbkey}.pub:/root/.android/adbkey.pub:ro,z
    networks:
      - smithr-network

networks:
  smithr-network:
    external: true
