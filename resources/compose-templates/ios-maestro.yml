#
# iOS Maestro sidecar (substrate-aware)
#
# Stays alive as a sidecar — run tests via docker exec:
#
#   docker exec <project>-maestro-1 /run-test.sh /flows/login.yaml
#
# Substrate dispatch:
#   simulated (default) — SSHes into macOS VM, runs Maestro there
#   physical            — SSHes into bridge container, runs Maestro there
#
# Compose with the ios-phone proxy and app sidecar:
#
#   curl -s http://localhost:7070/api/compose/ios-phone > /tmp/ios.yml
#   curl -s http://localhost:7070/api/compose/ios-app > /tmp/ios-app.yml
#   curl -s http://localhost:7070/api/compose/ios-maestro > /tmp/ios-maestro.yml
#   APP_PATH=/path/to/MyApp.app FLOWS_DIR=/path/to/flows \
#     docker compose -f /tmp/ios.yml -f /tmp/ios-app.yml -f /tmp/ios-maestro.yml \
#     -p test up -d
#
# Env vars:
#   SMITHR_SUBSTRATE — simulated (default) | physical
#   FLOWS_DIR        — host path to Maestro flow files (default: current dir)
#   SSH_USER         — SSH user (default: smithr for simulated, root for physical)
#   SSH_KEY_PATH     — host path to SSH private key (default: ~/.ssh/id_macos)
#   MAESTRO_EXTRA    — extra args to pass to Maestro (optional)
#
# Physical substrate: Maestro + driver-apps are mounted on the bridge container
# by Smithr's register-devices (devices.clj), not by this compose template.
#
services:
  maestro:
    image: smithr-simctl-tools:latest
    entrypoint: ["/maestro-sidecar.sh"]
    depends_on:
      ios-phone:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      SMITHR_SUBSTRATE: ${SMITHR_SUBSTRATE:-simulated}
      SSH_TARGET: ios-phone:22
      SSH_USER: ${SSH_USER:-}
      SSH_KEY: /root/.ssh/id_macos
      MAESTRO_EXTRA: ${MAESTRO_EXTRA:-}
      MAESTRO_HOME: /opt/maestro
      LOGIN_FLOW: ${LOGIN_FLOW:-}
      LOGOUT_FLOW: ${LOGOUT_FLOW:-}
      BUNDLE_ID: ${BUNDLE_ID:-}
      EMAIL: ${EMAIL:-}
      PASSWORD: ${PASSWORD:-}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/maestro-ready"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 120s
    stop_grace_period: 60s
    volumes:
      - ${FLOWS_DIR:-.}:/flows:ro,z
      - ${SSH_KEY_PATH:-~/.ssh/id_macos}:/root/.ssh/id_macos:ro,z
    networks:
      - internal

networks:
  internal:
