#
# Android app lifecycle sidecar
#
# Manages the full app lifecycle on an Android device:
#   up:   install APK → inject config → server bridge → run login flow → HEALTHY
#   down: run logout flow → force-stop → uninstall
#
# Login and logout flows are injectable — mounted from the host via FLOWS_DIR,
# selected via LOGIN_FLOW / LOGOUT_FLOW env vars. This keeps auth logic in
# app-space (the flows), not in the container. Test body flows can be run
# separately via docker exec on the maestro sidecar.
#
# Compose with android-phone, server, and maestro templates:
#
#   curl -s http://localhost:7070/api/compose/android-phone > /tmp/phone.yml
#   curl -s http://localhost:7070/api/compose/android-app > /tmp/app.yml
#   curl -s http://localhost:7070/api/compose/server > /tmp/server.yml
#   curl -s http://localhost:7070/api/compose/maestro > /tmp/maestro.yml
#   APP_PATH=/path/to/apk-dir FLOWS_DIR=/path/to/flows \
#     docker compose -f /tmp/phone.yml -f /tmp/server.yml \
#                    -f /tmp/app.yml -f /tmp/maestro.yml -p test up -d
#
# Env vars:
#   APP_PATH        — host dir containing the APK (required, mounted at /app)
#   APP_FILE        — APK filename inside APP_PATH (default: app-release.apk)
#   BUNDLE_ID       — Android package name (default: com.artha.healthcare)
#   API_URL         — override api-config.json for test server (optional)
#   SERVER_SERVICE  — compose service name for server bridge (optional)
#   SERVER_PORT     — server port to bridge into device (default: 3000)
#   LOGIN_FLOW      — Maestro flow for login (default: /flows/login.yaml)
#   LOGOUT_FLOW     — Maestro flow for logout (default: /flows/logout.yaml)
#   EMAIL           — login email (default: carer1@demo.artha.care)
#   PASSWORD        — login password (default: Demo123!)
#   FLOWS_DIR       — host path to Maestro flow files (required, mounted at /flows)
#
services:
  app:
    image: artha-maestro:latest
    depends_on:
      android-phone:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        ADB="adb -s $$ADB_TARGET"

        # ── Teardown (SIGTERM/INT) ──────────────────────────────
        APP_INSTALLED=false
        teardown() {
            echo "[android-app] Teardown starting..."
            if [ "$$APP_INSTALLED" = "true" ]; then
                if [ -n "$$LOGOUT_FLOW" ] && [ -f "$$LOGOUT_FLOW" ]; then
                    echo "[android-app] Running logout flow: $$LOGOUT_FLOW"
                    maestro --device "$$ADB_TARGET" test "$$LOGOUT_FLOW" 2>&1 || true
                fi
                echo "[android-app] Force-stopping $$BUNDLE_ID..."
                $$ADB shell am force-stop "$$BUNDLE_ID" 2>/dev/null || true
                echo "[android-app] Uninstalling $$BUNDLE_ID..."
                $$ADB uninstall "$$BUNDLE_ID" 2>/dev/null || true
            fi
            echo "[android-app] Teardown complete."
            exit 0
        }
        trap teardown TERM INT

        # ── Connect ADB ────────────────────────────────────────
        echo "[android-app] Connecting ADB to $$ADB_TARGET..."
        for i in $$(seq 1 60); do
          if adb connect "$$ADB_TARGET" 2>/dev/null | grep -q "connected"; then
            break
          fi
          sleep 2
        done
        $$ADB wait-for-device
        echo "[android-app] ADB connected."

        # ── Server bridge ──────────────────────────────────────
        if [ -n "$$SERVER_SERVICE" ]; then
            echo "[android-app] Server bridge: $$SERVER_SERVICE:$$SERVER_PORT → device localhost:$$SERVER_PORT"
            socat TCP-LISTEN:$$SERVER_PORT,fork,reuseaddr TCP:$$SERVER_SERVICE:$$SERVER_PORT &
            sleep 1
            $$ADB reverse tcp:$$SERVER_PORT tcp:$$SERVER_PORT
            echo "[android-app] Server bridge ready."
        fi

        # ── Install APK ───────────────────────────────────────
        echo "[android-app] Uninstalling stale app..."
        $$ADB uninstall "$$BUNDLE_ID" 2>/dev/null || true
        echo "[android-app] Installing /app/$$APP_FILE..."
        if ! $$ADB install "/app/$$APP_FILE"; then
            echo "[android-app] FATAL: APK install failed"
            exit 1
        fi
        APP_INSTALLED=true

        # ── Inject api-config.json ─────────────────────────────
        if [ -n "$$API_URL" ]; then
            echo "[android-app] Injecting api-config.json: $$API_URL"
            echo "{\"apiUrl\": \"$$API_URL\"}" > /tmp/api-config.json
            $$ADB push /tmp/api-config.json \
              /sdcard/Android/data/$$BUNDLE_ID/files/api-config.json
        fi

        # ── Login ──────────────────────────────────────────────
        if [ -n "$$LOGIN_FLOW" ] && [ -f "$$LOGIN_FLOW" ]; then
            echo "[android-app] Running login flow: $$LOGIN_FLOW"
            if ! maestro --device "$$ADB_TARGET" test \
              -e EMAIL="$$EMAIL" -e PASSWORD="$$PASSWORD" \
              "$$LOGIN_FLOW"; then
                echo "[android-app] FATAL: Login flow failed"
                exit 1
            fi
        fi

        # ── Ready ──────────────────────────────────────────────
        touch /tmp/app-installed
        echo "[android-app] Ready. App installed and logged in."

        # Stay alive — sleep in background so trap fires promptly
        while true; do sleep 60 & wait $$!; done
    environment:
      ADB_TARGET: ${ADB_TARGET:-android-phone:5555}
      BUNDLE_ID: ${BUNDLE_ID:-com.artha.healthcare}
      APP_FILE: ${APP_FILE:-app-release.apk}
      API_URL: ${API_URL:-}
      SERVER_SERVICE: ${SERVER_SERVICE:-}
      SERVER_PORT: ${SERVER_PORT:-3000}
      LOGIN_FLOW: ${LOGIN_FLOW:-/flows/login.yaml}
      LOGOUT_FLOW: ${LOGOUT_FLOW:-/flows/logout.yaml}
      EMAIL: ${EMAIL:-carer1@demo.artha.care}
      PASSWORD: ${PASSWORD:-Demo123!}
      MAESTRO_OPTS: "-Dmaestro.driver.port=${DRIVER_PORT:-7101}"
      JAVA_TOOL_OPTIONS: ""
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/app-installed"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 120s
    stop_grace_period: 60s
    volumes:
      - ${APP_PATH:?APP_PATH must be set}:/app:ro,z
      - ${FLOWS_DIR:-.}:/flows:ro,z
      - ${ADB_KEY_PATH:-~/.android/adbkey}:/root/.android/adbkey:ro,z
      - ${ADB_KEY_PATH:-~/.android/adbkey}.pub:/root/.android/adbkey.pub:ro,z
    networks:
      - internal

networks:
  internal:
