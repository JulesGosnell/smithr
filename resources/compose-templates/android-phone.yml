services:
  android-phone:
    image: {{REGISTRY}}/smithr/proxy:latest
    pull_policy: always
    stop_grace_period: 120s
    healthcheck:
      test: /usr/local/bin/healthcheck.sh
      interval: 5s
      timeout: 5s
      retries: 200
      start_period: 15s
    environment:
      SMITHR_MODE: lease
      SMITHR_URL: {{SMITHR_URL}}
      SMITHR_RESOURCE_TYPE: phone
      SMITHR_PLATFORM: android
      SMITHR_LESSEE: ${SMITHR_LESSEE:-anonymous}
      SMITHR_PORTS: "5555"
      SMITHR_TTL: ${SMITHR_TTL:-3600}
    networks:
      - smithr-network

networks:
  smithr-network:
    external: true
