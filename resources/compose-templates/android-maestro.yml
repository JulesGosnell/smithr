#
# Android Maestro test runner sidecar (near-side architecture)
#
# SSHes into the phone worker container and runs Maestro tests there.
# Maestro + ADB are pre-installed on the worker — no heavy images needed.
#
# Compose with the android-phone proxy:
#   curl -s http://localhost:7070/api/compose/android-phone > phone.yml
#   curl -s http://localhost:7070/api/compose/android-maestro > maestro.yml
#   FLOWS_DIR=./flows docker compose -f phone.yml -f maestro.yml -p test up -d
#
# Run tests:
#   docker exec test-maestro-1 /run-test.sh login.yaml -e APP_ID=com.example
#
# Env vars:
#   FLOWS_DIR      — host path to Maestro flow files (default: current dir)
#   SSH_KEY_PATH   — host path to SSH private key (default: ~/.ssh/smithr_worker)
#   MAESTRO_EXTRA  — extra args to pass to Maestro (optional)
#
services:
  maestro:
    image: alpine:3.19
    depends_on:
      android-phone:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Retry apk add — DNS may not be ready immediately on container start
        for _i in 1 2 3 4 5; do
          apk add --no-cache openssh-client rsync >/dev/null 2>&1 && break
          sleep 2
        done

        SSH_OPTS="-o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10"
        [ -f /root/.ssh/id_key ] && SSH_OPTS="$$SSH_OPTS -i /root/.ssh/id_key"

        # Create the run-test.sh script
        # NOTE: $$ escaping required — Docker Compose interpolates $ at YAML level
        # before the shell sees the heredoc quoting.
        cat > /run-test.sh << 'SCRIPT'
        #!/bin/sh
        set -e
        FLOW="$$1"
        shift
        SSH_OPTS="-o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10"
        [ -f /root/.ssh/id_key ] && SSH_OPTS="$$SSH_OPTS -i /root/.ssh/id_key"
        SSH="ssh $$SSH_OPTS root@android-phone"

        # SCP flow files to worker
        echo "[maestro] Copying flows to worker..."
        $$SSH "mkdir -p /tmp/flows" 2>/dev/null
        scp $$SSH_OPTS -r /flows/* root@android-phone:/tmp/flows/

        # Kill stale Maestro driver processes and clean ADB forwards
        $$SSH "pkill -f 'java.*maestro' 2>/dev/null; adb forward --remove-all 2>/dev/null; sleep 1" || true

        # Run Maestro on worker
        echo "[maestro] Running: maestro test /tmp/flows/$$FLOW $$@"
        $$SSH "maestro test /tmp/flows/$$FLOW $$*"
        EXIT=$$?

        # Copy artifacts back
        scp $$SSH_OPTS -r root@android-phone:/tmp/maestro-results/* /results/ 2>/dev/null || true

        exit $$EXIT
        SCRIPT
        chmod +x /run-test.sh

        # Verify SSH is available before marking ready
        if ! command -v ssh >/dev/null 2>&1; then
          echo "[maestro] ERROR: openssh-client failed to install" >&2
          exit 1
        fi
        touch /tmp/maestro-ready
        echo "[maestro] Sidecar ready. Run tests via: docker exec <container> /run-test.sh <flow>.yaml"
        exec sleep infinity
    environment:
      MAESTRO_EXTRA: ${MAESTRO_EXTRA:-}
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/maestro-ready"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    volumes:
      - ${FLOWS_DIR:-.}:/flows:ro,z
      - ${SSH_KEY_PATH:-~/.ssh/smithr_worker}:/root/.ssh/id_key:ro,z
    networks:
      - internal

networks:
  internal:
