#
# iOS app install/uninstall sidecar (substrate-aware)
#
# SSHes into the target (via ios-phone proxy), installs the app,
# launches it, and stays alive.
# On shutdown: uninstalls the app before the phone lease is released.
#
# Substrate dispatch:
#   simulated (default) — target is macOS VM (xcrun simctl)
#   physical            — target is bridge container (pymobiledevice3)
#
# Compose with the ios-phone proxy template:
#
#   curl -s http://localhost:7070/api/compose/ios-phone > /tmp/ios.yml
#   curl -s http://localhost:7070/api/compose/ios-app > /tmp/ios-app.yml
#   APP_PATH=/path/to/MyApp.app docker compose -f /tmp/ios.yml -f /tmp/ios-app.yml -p test up -d
#
# Env vars:
#   SMITHR_SUBSTRATE — simulated (default) | physical
#   APP_PATH         — host path to .app/.ipa bundle (required)
#   BUNDLE_ID        — iOS bundle identifier (required)
#   APP_BASENAME     — .app/.ipa filename (required)
#   SSH_USER         — SSH user (default: smithr for simulated, root for physical)
#   SSH_KEY_PATH     — host path to SSH private key (default: ~/.ssh/id_macos)
#   API_URL          — override api-config.json in the app bundle (optional)
#
services:
  app:
    image: smithr-simctl-tools:latest
    depends_on:
      ios-phone:
        condition: service_healthy
    environment:
      SMITHR_SUBSTRATE: ${SMITHR_SUBSTRATE:-simulated}
      SSH_TARGET: ios-phone:22
      SSH_USER: ${SSH_USER:-}
      SSH_KEY: /root/.ssh/id_macos
      BUNDLE_ID: ${BUNDLE_ID:?BUNDLE_ID must be set}
      APP_FILE: /app/${APP_BASENAME:?APP_BASENAME must be set}
      API_URL: ${API_URL:-}
    volumes:
      - ${APP_PATH:?APP_PATH must be set}:/app:ro,z
      - ${SSH_KEY_PATH:-~/.ssh/id_macos}:/root/.ssh/id_macos:ro,z
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/app-installed"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 120s
    stop_grace_period: 30s
    networks:
      - internal

networks:
  internal:
