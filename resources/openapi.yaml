openapi: "3.1.0"
info:
  title: Smithr Resource Pool API
  description: |
    Manages phones, emulators, macOS VMs, and iOS simulators across
    multiple hosts. Push-based state via Docker events, atomic leasing
    with SSH tunnel provisioning.
  version: "0.3.0"
  contact:
    name: Smithr
    url: https://github.com/JulesGosnell/smithr

servers:
  - url: http://localhost:7070
    description: Local development

paths:
  /api/resources:
    get:
      operationId: listResources
      summary: List all resources across all hosts
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [phone, vm]
          description: Filter by resource type
        - name: platform
          in: query
          schema:
            type: string
            enum: [android, ios, macos]
          description: Filter by platform
        - name: status
          in: query
          schema:
            type: string
            enum: [booting, warm, shared, leased, dead]
          description: Filter by status
        - name: host
          in: query
          schema:
            type: string
          description: Filter by host label
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"

  /api/resources/{id}:
    get:
      operationId: getResource
      summary: Get a single resource by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Resource not found

  /api/leases:
    get:
      operationId: listLeases
      summary: List active leases
      parameters:
        - name: lessee
          in: query
          schema:
            type: string
          description: Filter by lessee name
      responses:
        "200":
          description: List of leases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lease"
    post:
      operationId: acquireLease
      summary: Acquire a lease on an available resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaseRequest"
      responses:
        "201":
          description: Lease acquired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lease"
        "400":
          description: Invalid request (e.g., bad workspace name)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: No matching resource available or workspace already leased
          headers:
            Retry-After:
              description: Suggested retry delay in seconds based on earliest lease expiry
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitEstimate"

  /api/leases/{id}:
    get:
      operationId: getLease
      summary: Get a single lease by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lease details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lease"
        "404":
          description: Lease not found
    delete:
      operationId: unleaseLease
      summary: Unlease a resource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Lease unleased
        "404":
          description: Lease not found

  /api/workspaces:
    get:
      operationId: listWorkspaces
      summary: List all workspaces
      description: |
        Returns all named workspaces across all macOS VMs.
        Workspaces are persistent build environments that persist across unleases.
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"

  /api/workspaces/{name}:
    get:
      operationId: getWorkspace
      summary: Get a workspace by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: Workspace not found
    delete:
      operationId: purgeWorkspace
      summary: Purge a workspace (delete macOS user and home directory)
      description: |
        Permanently deletes the workspace, its macOS user account, and home directory.
        Only works when the workspace is idle (not currently leased).
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Workspace purged
        "404":
          description: Workspace not found
        "409":
          description: Workspace is currently leased

  /api/adopt:
    post:
      operationId: adoptContainer
      summary: Adopt an external container
      description: |
        Register an externally-managed container with Smithr.
        Creates SSH tunnels for the specified ports. The adopt record is
        automatically cleaned up when the container stops (Docker event-driven).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdoptRequest"
      responses:
        "201":
          description: Container adopted, tunnels created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Adopt"
        "404":
          description: Container not found on any connected Docker host
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Tunnel creation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/adopts:
    get:
      operationId: listAdopts
      summary: List all active adopted containers
      responses:
        "200":
          description: List of active adopts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Adopt"

  /api/adopts/{id}:
    delete:
      operationId: unadopt
      summary: Unadopt a container (manual cleanup)
      description: |
        Manually remove an adopt record and its tunnels.
        Usually unnecessary — Docker events handle cleanup automatically
        when the container stops.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Adopt removed and tunnels destroyed
        "404":
          description: Adopt not found

  /api/wait-estimate:
    get:
      operationId: getWaitEstimate
      summary: Estimate wait time for a resource type
      description: |
        Returns an estimated wait time before a resource matching the given
        filters becomes available. Useful for dashboards, CLIs, and proxy
        sidecars to make informed retry decisions.
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [phone, vm, server]
          description: Resource type
        - name: platform
          in: query
          required: true
          schema:
            type: string
            enum: [android, ios, macos]
          description: Resource platform
        - name: lease_type
          in: query
          schema:
            type: string
            enum: [phone, build]
            default: phone
          description: Lease type (phone=exclusive, build=shared)
        - name: substrate
          in: query
          schema:
            type: string
            enum: [emulated, simulated, virtual, physical]
          description: Optional substrate filter
        - name: model
          in: query
          schema:
            type: string
          description: Optional device model filter
      responses:
        "200":
          description: Wait estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitEstimate"
        "400":
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/hosts:
    get:
      operationId: listHosts
      summary: List connected Docker hosts
      responses:
        "200":
          description: List of hosts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Host"

  /api/catalogue:
    get:
      operationId: getCatalogue
      summary: List provisionable resource types and active resources
      description: |
        Returns the provisioning catalogue — what resource types Smithr can
        auto-provision from compose templates, along with currently running
        resources. Useful for CI tooling and the dashboard.
      responses:
        "200":
          description: Catalogue of templates and active resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Catalogue"

  /api/scan/devices:
    get:
      operationId: scanDevices
      summary: Scan local host for connected USB devices
      description: |
        Scans for physical Android (adb) and iOS (libimobiledevice) devices
        connected to this host. Returns device details without modifying state.
      responses:
        "200":
          description: List of discovered devices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceScan"

  /api/health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/metrics:
    get:
      operationId: listMetrics
      summary: Resource and lease metrics
      description: |
        Returns aggregated metrics about resources, leases, and tunnels
        for monitoring and dashboards.
      responses:
        "200":
          description: Metrics data
          content:
            application/json:
              schema:
                type: object

  /api/events:
    get:
      operationId: listEvents
      summary: Recent Docker and lease events
      description: |
        Returns recent events (container start/stop, lease acquire/unlease,
        adopt/unadopt) for debugging and audit.
      responses:
        "200":
          description: List of recent events
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/provision:
    post:
      operationId: provisionResource
      summary: Auto-provision a resource from a compose template
      description: |
        Provisions a new resource by launching a container from one of the
        catalogue templates. The resource becomes available for leasing
        once it starts and Smithr detects it via Docker events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Resource provisioning started
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid provisioning request

  /api/compose/{template}:
    get:
      operationId: serveComposeTemplate
      summary: Serve a compose template for proxy sidecar
      description: |
        Returns a Docker Compose YAML file for the given template name.
        Registry and Smithr URL placeholders are substituted automatically.
      parameters:
        - name: template
          in: path
          required: true
          schema:
            type: string
          description: Template name (e.g., android-phone, ios-phone, macos-build)
      responses:
        "200":
          description: Compose YAML
          content:
            text/yaml:
              schema:
                type: string
        "404":
          description: Template not found

  /api/templates:
    get:
      operationId: listPublishedTemplates
      summary: List published compose templates
      responses:
        "200":
          description: List of published templates
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: publishTemplate
      summary: Publish a compose template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Template published

  /api/templates/{name}:
    delete:
      operationId: deletePublishedTemplate
      summary: Delete a published template
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Template deleted
        "404":
          description: Template not found

  /openapi.yaml:
    get:
      operationId: getSpec
      summary: Serve the raw OpenAPI spec
      responses:
        "200":
          description: OpenAPI spec
          content:
            text/yaml:
              schema:
                type: string

components:
  schemas:
    Resource:
      type: object
      required: [id, type, platform, host, status, container]
      properties:
        id:
          type: string
          description: Unique resource identifier (host:platform:port)
          example: "megalodon:android:5557"
        type:
          type: string
          enum: [phone, vm]
        platform:
          type: string
          enum: [android, ios, macos]
        host:
          type: string
          example: megalodon
        status:
          type: string
          enum: [booting, warm, shared, leased, dead]
        container:
          type: string
          description: Docker container name
          example: smithr-android-0
        connection:
          $ref: "#/components/schemas/Connection"
        max_slots:
          type: integer
          description: Maximum concurrent build leases (macOS VMs only)
          example: 10
        active_lease_count:
          type: integer
          description: Number of currently active build leases (macOS VMs only)
          example: 3
        substrate:
          type: string
          enum: [emulated, simulated, virtual, physical]
          description: How the resource runs (emulated, simulated, virtual, physical)
        model:
          type: string
          description: Device model name
          example: "Nexus 5"
        provisioned:
          type: boolean
          description: Whether this resource was auto-provisioned by Smithr
        parent:
          type: string
          description: Parent container name (iOS simulators reference their macOS VM)
          example: smithr-xcode-fe
        lease_id:
          type: string
          description: Active lease ID if leased
        updated_at:
          type: string
          format: date-time

    Connection:
      type: object
      description: Connection details for the resource
      properties:
        adb_host:
          type: string
          description: ADB host IP (Android)
        adb_port:
          type: integer
          description: ADB port (Android)
        ssh_host:
          type: string
          description: SSH host (iOS/macOS)
        ssh_port:
          type: integer
          description: SSH port (iOS/macOS)
        tunnel_port:
          type: integer
          description: Smithr-managed SSH tunnel port (allocated on lease)
        tunnel_host:
          type: string
          description: LAN IP of the Smithr host where tunnel ports are accessible
          example: "192.168.0.73"
        vnc_port:
          type: integer
          description: Smithr-managed VNC tunnel port (allocated on lease, if resource has VNC)
        ssh_user:
          type: string
          description: SSH username for the tunnel
        home_dir:
          type: string
          description: Home directory path (build leases only)
          example: /Users/build-a1b2c3d4

    LeaseRequest:
      type: object
      required: [type, platform]
      properties:
        type:
          type: string
          enum: [phone, vm]
        platform:
          type: string
          enum: [android, ios, macos]
        ttl_seconds:
          type: integer
          minimum: 60
          maximum: 86400
          default: 1800
          description: Lease duration in seconds
        lessee:
          type: string
          default: anonymous
          description: Identifier for who is leasing
        lease_type:
          type: string
          enum: [build, phone]
          default: phone
          description: Type of lease - build (shared, concurrent) or phone (exclusive)
        substrate:
          type: string
          enum: [emulated, simulated, virtual, physical]
          description: |
            Optional filter for resource substrate. When specified, only
            resources matching this substrate are considered.
        model:
          type: string
          description: |
            Optional filter for specific device model (e.g., "Pixel 8",
            "iPhone 16 Pro Max"). When specified, only resources with a
            matching model label are considered.
          example: "Pixel 8"
        workspace:
          type: string
          pattern: "^[a-zA-Z][a-zA-Z0-9-]{2,30}$"
          description: |
            Named workspace for warm/persistent builds. When provided, the macOS
            user account and home directory persist across lease releases, so
            subsequent builds can reuse cached dependencies and source code.
            Implies lease_type=build. Only one lease per workspace at a time.
          example: artha-build-1

    Lease:
      type: object
      required: [id, resource_id, lessee, ttl_seconds, acquired_at, expires_at]
      properties:
        id:
          type: string
          format: uuid
        resource_id:
          type: string
        host:
          type: string
        lessee:
          type: string
        ttl_seconds:
          type: integer
        acquired_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        lease_type:
          type: string
          enum: [build, phone]
          description: Type of lease
        workspace:
          type: string
          description: Workspace name (warm builds only)
          example: artha-build-1
        macos_user:
          type: string
          description: macOS user account (build leases only)
          example: build-a1b2c3d4
        parent_lease_id:
          type: string
          format: uuid
          description: |
            Parent hold lease ID (iOS phone leases only). When an iOS simulator
            is leased, a build lease is automatically created on the parent macOS
            VM to prevent GC. This lease is auto-released on unlease.
        connection:
          $ref: "#/components/schemas/Connection"

    Workspace:
      type: object
      required: [name, resource_id, macos_user, status]
      properties:
        name:
          type: string
          description: Workspace name (also the macOS username)
          example: artha-build-1
        resource_id:
          type: string
          description: macOS VM resource this workspace lives on
        macos_user:
          type: string
          description: macOS user account
        status:
          type: string
          enum: [idle, leased]
          description: Whether the workspace is currently in use
        lease_id:
          type: string
          format: uuid
          description: Active lease ID (when status is leased)
        created_at:
          type: string
          format: date-time

    Host:
      type: object
      required: [label, connected]
      properties:
        label:
          type: string
        docker_uri:
          type: string
        connected:
          type: boolean
        resource_count:
          type: integer

    Health:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        hosts:
          type: integer
        resources:
          type: integer
        leases:
          type: integer
        workspaces:
          type: integer

    AdoptRequest:
      type: object
      required: [container_name, ports]
      properties:
        container_name:
          type: string
          description: Docker container name (must be running on a connected host)
          example: artha-postgres
        ports:
          type: array
          items:
            type: integer
          description: Container ports to tunnel
          example: [5432]
        lessee:
          type: string
          default: anonymous
          description: Identifier for who is adopting
          example: artha
        ttl_seconds:
          type: integer
          minimum: 60
          maximum: 86400
          default: 3600
          description: Adopt duration in seconds (auto-cleaned by GC after expiry)

    Adopt:
      type: object
      required: [id, container_name, container_id, host, lessee, ports, tunnel_host, ttl_seconds, adopted_at, expires_at]
      properties:
        id:
          type: string
          format: uuid
        container_name:
          type: string
          description: Docker container name
          example: artha-postgres
        container_id:
          type: string
          description: Docker container ID
          example: abc123def456
        host:
          type: string
          description: Docker host where the container is running
          example: megalodon
        lessee:
          type: string
          example: artha
        ports:
          type: object
          additionalProperties:
            type: integer
          description: "Map of original_port → tunnel_port"
          example: {"5432": 17005}
        tunnel_host:
          type: string
          description: Hostname where tunnels are bound (for SSH -R from other hosts)
          example: megalodon
        ttl_seconds:
          type: integer
        adopted_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    Catalogue:
      type: object
      properties:
        templates:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                example: android-phone
              type:
                type: string
                example: phone
              platform:
                type: string
                example: android
              substrate:
                type: string
                example: emulated
              model:
                type: string
                example: "Nexus 5"
              os:
                type: string
                example: "Android 9.0"
              description:
                type: string
              boot_time_seconds:
                type: integer
        active_resources:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              platform:
                type: string
              substrate:
                type: string
              model:
                type: string
              status:
                type: string
              provisioned:
                type: boolean
              host:
                type: string

    DeviceScan:
      type: object
      properties:
        host:
          type: string
          example: megalodon
        devices:
          type: array
          items:
            type: object
            properties:
              serial:
                type: string
                description: Android device serial (adb)
              udid:
                type: string
                description: iOS device UDID (libimobiledevice)
              platform:
                type: string
                enum: [android, ios]
              model:
                type: string
              substrate:
                type: string
                enum: [physical]

    WaitEstimate:
      type: object
      properties:
        error:
          type: string
          description: Present only in 409 responses
        message:
          type: string
          description: Human-readable message (present only in 409 responses)
        wait_estimate_seconds:
          type: integer
          description: Estimated seconds until a resource becomes available (0 if available now)
          example: 120
        earliest_expiry:
          type: string
          format: date-time
          description: When the earliest active lease expires (null if resources available)
        resources_total:
          type: integer
          description: Total matching resources across all hosts
          example: 2
        resources_available:
          type: integer
          description: Resources available right now (present when > 0)
          example: 0
        resources_busy:
          type: integer
          description: Resources currently leased or at capacity
          example: 2
        active_leases:
          type: integer
          description: Number of active leases on matching resources
          example: 2

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
