# Smithr CI Template — Copy to your project's .github/workflows/
#
# This workflow:
# 1. Builds server, Android APK, and iOS app in parallel
# 2. Starts a shared server environment (DB, Redis, TLS, DNS, project API)
# 3. Runs E2E tests in parallel, each acquiring a phone from the warm pool
# 4. Deploys on success (main branch only)
#
# Prerequisites:
# - Self-hosted runners with Smithr installed
# - smithr.yml in project root (see smithr.yml.example)
# - Phone pool pre-warmed (via systemd or manual smithr phone warm)
#
# Customise the TODOs below for your project.

name: Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel running builds

env:
  SMITHR_ROOT: /path/to/smithr  # TODO: Set to your Smithr installation path

jobs:
  # ─── Build Phase (Parallel) ───────────────────────────────────────
  build-server:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: |
          # TODO: Replace with your server build command
          # docker build -t myapp-api .
          echo "Building server..."

  build-android:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Build Android APK
        run: |
          # TODO: Replace with your build command, or use a pre-built APK
          # The APK path is configured in smithr.yml (mobile.android.apk)
          echo "Building Android APK..."

  build-ios:
    runs-on: [self-hosted, linux]
    if: false  # TODO: Enable when iOS build is ready
    steps:
      - uses: actions/checkout@v4

      - name: Build iOS app
        run: echo "Building iOS app..."

  # ─── Server Setup (Once) ──────────────────────────────────────────
  start-server:
    needs: [build-server]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Start shared server (idempotent)
        run: |
          # This starts DB, Redis, TLS, DNS, runs project DB setup
          # (migrations, seeds), and starts the project API server.
          # Safe to call multiple times — only starts if not running.
          $SMITHR_ROOT/bin/smithr server ensure --config smithr.yml

  # ─── Test Phase (Parallel Matrix) ─────────────────────────────────
  e2e-test:
    needs: [start-server, build-android]
    runs-on: [self-hosted, linux]
    strategy:
      fail-fast: false  # Run all tests even if one fails
      matrix:
        test:
          # TODO: Replace with your test file names (from tests.dir in smithr.yml)
          - login-test.yaml
          - smoke-test.yaml
    steps:
      - uses: actions/checkout@v4

      - name: Acquire phone
        id: phone
        run: |
          HANDLE=$($SMITHR_ROOT/bin/smithr phone get --type android)
          echo "handle=$HANDLE" >> $GITHUB_OUTPUT

      - name: Run E2E test (${{ matrix.test }})
        run: |
          $SMITHR_ROOT/bin/smithr test run ${{ matrix.test }} \
            --config smithr.yml \
            --device ${{ steps.phone.outputs.handle }}

      - name: Release phone
        if: always()
        run: $SMITHR_ROOT/bin/smithr phone release ${{ steps.phone.outputs.handle }}

  # ─── Deploy Phase ─────────────────────────────────────────────────
  deploy:
    needs: [e2e-test]
    runs-on: [self-hosted, linux]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          # TODO: Replace with your deployment commands
          echo "Deploying to production..."

  # ─── Cleanup ──────────────────────────────────────────────────────
  cleanup:
    needs: [e2e-test]
    runs-on: [self-hosted, linux]
    if: always()
    steps:
      - name: Stop shared server
        run: $SMITHR_ROOT/bin/smithr server stop --config smithr.yml
